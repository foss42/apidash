name: apidash
description: API Dash is a beautiful open-source cross-platform API Client built using Flutter which can help you easily create & customize your API requests, visually inspect responses and generate API integration code on the go.
publish_to: "none"
version: 0.5.0+5

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.2"

workspace:
  - packages/*

dependencies:
  flutter:
    sdk: flutter
  apidash_core: any
  apidash_design_system: any
  carousel_slider: ^5.1.2
  code_builder: ^4.11.1
  csv: ^7.2.0
  data_table_2: 2.5.16
  dart_style: ^3.1.6
  desktop_drop: ^0.7.0
  extended_text_field: ^16.0.0
  file_selector: ^1.1.0
  flex_color_scheme: ^8.4.0
  flutter_code_editor: ^0.3.5
  flutter_highlight: ^0.7.0
  flutter_highlighter: ^0.1.0
  flutter_hooks: ^0.21.3+1
  flutter_js: ^0.8.7
  flutter_markdown_plus: ^1.0.7
  flutter_portal: ^1.1.4
  flutter_riverpod: ^3.2.1
  flutter_svg: ^2.2.4
  fvp: ^0.35.2
  highlight: ^0.7.0
  highlighter: ^0.1.1
  hive_ce_flutter: ^2.3.4
  hooks_riverpod: ^3.2.1
  intl: ^0.20.2
  jinja: ^0.6.5
  json_annotation: ^4.11.0
  json_explorer: any
  json_field_editor: any
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: any
  media_kit_libs_windows_audio: any
  lottie: ^3.3.2
  markdown: ^7.3.0
  mime: ^2.0.0
  mime_dart: ^3.0.0
  multi_split_view: ^3.6.1
  multi_trigger_autocomplete_plus: any
  ollama_dart: ^1.3.0
  package_info_plus: ^9.0.0
  path: ^1.8.3
  path_provider: ^2.1.2
  printing: ^5.13.4
  provider: ^6.1.5+1
  pub_semver: ^2.1.5
  riverpod: ^3.2.1
  scrollable_positioned_list: ^0.3.8
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  stac: ^1.3.1
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  vector_graphics_compiler: ^1.2.0
  video_player: ^2.11.0
  video_player_platform_interface: ^6.6.0
  window_manager: ^0.5.1
  window_size:
    git:
      url: https://github.com/google/flutter-desktop-embedding.git
      path: plugins/window_size

dependency_overrides:
  extended_text_field: ^16.0.0
  pdf_widget_wrapper: ^1.0.4
  web: ^1.1.1
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  file_selector_platform_interface: ^2.7.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  integration_test:
    sdk: flutter
  melos: ^7.4.0
  mocktail: ^1.0.4
  spot: ^0.18.0
  test: ^1.29.0

melos:
  useRootAsPackage: true
  scripts:
    analyze:
      run: melos exec -- "flutter analyze"
      description: Analyze all packages

    clean:
      run: melos exec -- "flutter clean"
      description: Clean all packages

    build-gen:
      run: melos exec -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build generator for all packages

    test:
      run: melos exec --dir-exists=test --ignore="apidash" -- "flutter test --coverage"
      description: Run tests for all packages

    pub-get:
      run: melos exec -- "flutter pub get"
      description: Run pub get for all packages

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/dashbot/
