name: better_networking
description: "Simplified Networking. Support for sending REST & GraphQL API Requests."
version: 0.0.4-dev
homepage: https://github.com/foss42/apidash

topics:
  - networking
  - api
  - rest
  - http
  - graphql

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  convert: ^3.1.2
  crypto: ^3.0.7
  dart_jsonwebtoken: ^3.3.2
  flutter_web_auth_2: ^5.0.1
  http: ^1.6.0
  http_parser: ^4.1.2
  json5: ^0.8.2
  json_annotation: ^4.9.0
  seed:
    path: ../seed
  mqtt_client: ^10.11.9
  xml: ^6.3.0
  oauth1: ^2.1.0
  oauth2: ^2.0.5
  web_socket_channel: ^3.0.1
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1
  grpc_reflection:
    path: ../grpc_reflection

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  test: ^1.29.0
